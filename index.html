<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduLearn - Premium E-Learning Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Import Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;14..32,200;14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap');

        /* Smooth Scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
                        linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 100%);
        }

        /* Navigation */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: white;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.75rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(102, 126, 234, 0.5);
            color: #667eea;
        }

        .btn-outline:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
            transform: translateY(-2px);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Hero Section - Bento Style */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            padding: 4rem 2rem;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
        }

        .hero-stats {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin: 4rem 0;
        }

        .bento-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .bento-item:hover {
            transform: translateY(-10px);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .bento-item i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .bento-item h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .bento-item p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        /* Course Grid - Modern Cards */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .course-card:hover {
            transform: translateY(-8px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .course-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.6s;
        }

        .course-card:hover .course-thumbnail {
            transform: scale(1.05);
        }

        .course-info {
            padding: 1.5rem;
        }

        .course-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .course-instructor {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .course-price {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 1rem 0;
        }

        .rating {
            color: #ffc107;
            margin-bottom: 1rem;
        }

        /* Dashboard */
        .dashboard {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .dashboard-tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .tab-btn.active {
            color: white;
        }

        .tab-btn.active::after {
            width: 100%;
        }

        .enrolled-course {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .enrolled-course:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            overflow-y: auto;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 32px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.4s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: white;
            transform: rotate(90deg);
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Alert Messages */
        .alert {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: none;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 24px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.5rem;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        th {
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Video Player */
        .video-player {
            width: 100%;
            border-radius: 20px;
            margin: 1rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }
            
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .container {
                padding: 1rem;
            }
            
            .bento-grid {
                grid-template-columns: 1fr;
            }
            
            .courses-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Micro-interactions */
        .hover-glow {
            transition: all 0.3s;
        }

        .hover-glow:hover {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        /* Loading Animation */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div id="app"></div>

    <script>
        // Dummy Data
        const dummyData = {
            users: [
                { id: 1, name: "Admin User", email: "admin@edulearn.com", password: "admin123", role: "admin" },
                { id: 2, name: "John Student", email: "student@edulearn.com", password: "student123", role: "student" }
            ],
            courses: [
                {
                    id: 1,
                    title: "Complete Web Development Bootcamp 2024",
                    instructor: "Dr. Sarah Johnson",
                    description: "Learn HTML, CSS, JavaScript, React, Node.js, and MongoDB from scratch. Build real-world projects!",
                    category: "Web Development",
                    level: "Beginner",
                    price: 49.99,
                    thumbnail: "https://picsum.photos/id/0/400/250",
                    rating: 4.8,
                    students: 1234,
                    duration: "40 hours",
                    lessons: [
                        { id: 1, title: "Introduction to HTML", duration: "15:30", videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" },
                        { id: 2, title: "CSS Fundamentals", duration: "20:45", videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" },
                        { id: 3, title: "JavaScript Basics", duration: "25:00", videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" }
                    ]
                },
                {
                    id: 2,
                    title: "Python for Data Science & Machine Learning",
                    instructor: "Prof. Michael Chen",
                    description: "Master Python programming, data analysis with pandas, numpy, and machine learning algorithms",
                    category: "Data Science",
                    level: "Intermediate",
                    price: 59.99,
                    thumbnail: "https://picsum.photos/id/1/400/250",
                    rating: 4.9,
                    students: 2345,
                    duration: "35 hours",
                    lessons: [
                        { id: 4, title: "Python Basics", duration: "20:00", videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" },
                        { id: 5, title: "NumPy Arrays", duration: "18:30", videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" }
                    ]
                },
                {
                    id: 3,
                    title: "UI/UX Design Masterclass",
                    instructor: "Emma Watson",
                    description: "Learn design principles, Figma, user research, and prototyping. Create stunning designs!",
                    category: "Design",
                    level: "Beginner",
                    price: 39.99,
                    thumbnail: "https://picsum.photos/id/2/400/250",
                    rating: 4.7,
                    students: 3456,
                    duration: "25 hours",
                    lessons: [
                        { id: 6, title: "Design Principles", duration: "12:00", videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" },
                        { id: 7, title: "Figma Basics", duration: "15:30", videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4" }
                    ]
                }
            ],
            enrollments: [],
            payments: [],
            certificates: []
        };

        // App State
        let currentUser = null;
        let currentView = 'home';
        let selectedCourse = null;

        // Helper Functions
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            const container = document.querySelector('.container');
            if (container) {
                container.prepend(alertDiv);
                alertDiv.style.display = 'block';
                setTimeout(() => alertDiv.remove(), 3000);
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('users', JSON.stringify(dummyData.users));
            localStorage.setItem('courses', JSON.stringify(dummyData.courses));
            localStorage.setItem('enrollments', JSON.stringify(dummyData.enrollments));
            localStorage.setItem('payments', JSON.stringify(dummyData.payments));
            localStorage.setItem('certificates', JSON.stringify(dummyData.certificates));
        }

        function loadFromLocalStorage() {
            const users = localStorage.getItem('users');
            const courses = localStorage.getItem('courses');
            const enrollments = localStorage.getItem('enrollments');
            const payments = localStorage.getItem('payments');
            const certificates = localStorage.getItem('certificates');
            
            if (users) dummyData.users = JSON.parse(users);
            if (courses) dummyData.courses = JSON.parse(courses);
            if (enrollments) dummyData.enrollments = JSON.parse(enrollments);
            if (payments) dummyData.payments = JSON.parse(payments);
            if (certificates) dummyData.certificates = JSON.parse(certificates);
        }

        async function processPayment(courseId, amount) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve({ success: true, paymentId: 'pay_' + Date.now() });
                }, 1000);
            });
        }

        function generateCertificate(userId, courseId) {
            const certificateId = 'CERT-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
            const certificate = {
                id: certificateId,
                userId: userId,
                courseId: courseId,
                issuedAt: new Date().toISOString(),
                pdfUrl: '#'
            };
            dummyData.certificates.push(certificate);
            saveToLocalStorage();
            return certificate;
        }

        // Render Functions
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <nav class="navbar">
                    <div class="nav-container">
                        <div class="logo">
                            <i class="fas fa-graduation-cap"></i> EduLearn
                        </div>
                        <div class="nav-links">
                            <a onclick="navigateTo('home')">Home</a>
                            <a onclick="navigateTo('courses')">Courses</a>
                            ${currentUser ? `<a onclick="navigateTo('dashboard')">Dashboard</a>` : ''}
                            ${currentUser?.role === 'admin' ? `<a onclick="navigateTo('admin')">Admin</a>` : ''}
                            ${currentUser ?

        window.processCheckout = async function() {
            if (!currentUser) {
                showAlert('Please login first', 'error');
                navigateTo('login');
                return;
            }
            
            const result = await processPayment(selectedCourse.id, selectedCourse.price);
            
            if (result.success) {
                dummyData.payments.push({
                    id: Date.now(),
                    userId: currentUser.id,
                    courseId: selectedCourse.id,
                    amount: selectedCourse.price,
                    date: new Date().toISOString(),
                    status: 'completed'
                });
                
                dummyData.enrollments.push({
                    id: Date.now(),
                    userId: currentUser.id,
                    courseId: selectedCourse.id,
                    enrolledAt: new Date().toISOString(),
                    progress: 0,
                    completed: false
                });
                
                saveToLocalStorage();
                showAlert('Payment successful! You are now enrolled.', 'success');
                navigateTo('dashboard');
            }
        };

        window.handleLogin = function(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = dummyData.users.find(u => u.email === email && u.password === password);
            
            if (user) {
                currentUser = user;
                showAlert(`Welcome back, ${user.name}!`, 'success');
                navigateTo('home');
            } else {
                showAlert('Invalid credentials', 'error');
            }
        };

        window.handleRegister = function(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            if (dummyData.users.find(u => u.email === email)) {
                showAlert('Email already exists', 'error');
                return;
            }
            
            const newUser = {
                id: dummyData.users.length + 1,
                name,
                email,
                password,
                role: 'student'
            };
            
            dummyData.users.push(newUser);
            saveToLocalStorage();
            showAlert('Registration successful! Please login.', 'success');
            navigateTo('login');
        };

            currentUser = null;
            showAlert('Logged out successfully', 'success');
            navigateTo('home');
        };

            const enrollment = dummyData.enrollments.find(e => e.userId === currentUser.id && e.courseId === courseId);
            const course = dummyData.courses.find(c => c.id === courseId);
            
            if (enrollment && course) {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `

                render();

                <div>
                    ${userCertificates.length === 0 ? '<p>No certificates yet. Complete a course to earn one!</p>' : `
                        ${userCertificates.map(cert => {
                            const course = dummyData.courses.find(c => c.id === cert.courseId);
                            return `
                                <div class="enrolled-course">
                                    <h3>${course?.title}</h3>
                                    <p>Certificate ID: ${cert.id}</p>
                                    <p>Issued: ${new Date(cert.issuedAt).toLocaleDateString()}</p>
                                    <button class="btn btn-primary" onclick="alert('Certificate PDF would download here')">Download PDF</button>
                                </div>
                            `;
                        }).join('')}
                    `}
                </div>
            `;
        }

        function renderProfileSettings() {
            return `
                <div>
                    <h3>Profile Settings</h3>
                    <form onsubmit="updateProfile(event)">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="profileName" value="${currentUser.name}" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmail" value="${currentUser.email}" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>
            `;
        }

        window.updateProfile = function(event) {
            event.preventDefault();
            currentUser.name = document.getElementById('profileName').value;
            currentUser.email = document.getElementById('profileEmail').value;
            
            const userIndex = dummyData.users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                dummyData.users[userIndex] = currentUser;
                saveToLocalStorage();
                showAlert('Profile updated successfully', 'success');
                render();
            }
        };

        window.switchAdminTab = function(tab) {
            const content = document.getElementById('admin-content');
            switch(tab) {
                case 'courses':
                    content.innerHTML = renderAdminCourses();
                    break;
                case 'students':
                    content.innerHTML = renderAdminStudents();
                    break;
                case 'payments':
                    content.innerHTML = renderAdminPayments();
                    break;
                case 'add-course':
                    content.innerHTML = renderAddCourseForm();
                    break;
            }
        };

        function renderAdminStudents() {
            const students = dummyData.users.filter(u => u.role === 'student');
            return `
                <table>
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Email</th><th>Enrollments</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        ${students.map(student => {
                            const enrollments = dummyData.enrollments.filter(e => e.userId === student.id);
                            return `
                                <tr>
                                    <td>${student.id}</td>
                                    <td>${student.name}</td>
                                    <td>${student.email}</td>
                                    <td>${enrollments.length}</td>
                                    <td><button class="btn btn-outline" onclick="viewStudentDetails(${student.id})">View</button></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderAdminPayments() {
            return `
                <table>
                    <thead>
                        <tr><th>ID</th><th>Student</th><th>Course</th><th>Amount</th><th>Date</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                        ${dummyData.payments.map(payment => {
                            const student = dummyData.users.find(u => u.id === payment.userId);
                            const course = dummyData.courses.find(c => c.id === payment.courseId);
                            return `
                                <tr>
                                    <td>${payment.id}</td>
                                    <td>${student?.name || 'Unknown'}</td>
                                    <td>${course?.title || 'Unknown'}</td>
                                    <td>$${payment.amount}</td>
                                    <td>${new Date(payment.date).toLocaleDateString()}</td>
                                    <td><span style="color: #28a745;">${payment.status}</span></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderAddCourseForm() {
            return `
                <form onsubmit="addNewCourse(event)">
                    <div class="form-group">
                        <label>Course Title</label>
                        <input type="text" id="courseTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Instructor</label>
                        <input type="text" id="courseInstructor" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="courseDescription" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="coursePrice" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="courseCategory">
                            <option>Web Development</option>
                            <option>Data Science</option>
                            <option>Design</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Course →</button>
                </form>
            `;
        }

        window.addNewCourse = function(event) {
            event.preventDefault();
            const newCourse = {
                id: dummyData.courses.length + 1,
                title: document.getElementById('courseTitle').value,
                instructor: document.getElementById('courseInstructor').value,
                description: document.getElementById('courseDescription').value,
                price: parseFloat(document.getElementById('coursePrice').value),
                category: document.getElementById('courseCategory').value,
                level: "Beginner",
                thumbnail: "https://picsum.photos/id/10/400/250",
                rating: 0,
                students: 0,
                duration: "10 hours",
                lessons: []
            };
            
            dummyData.courses.push(newCourse);
            saveToLocalStorage();
            showAlert('Course added successfully!', 'success');
            switchAdminTab('courses');
        };

        window.viewStudentDetails = function(studentId) {
            const student = dummyData.users.find(u => u.id === studentId);
            const enrollments = dummyData.enrollments.filter(e => e.userId === studentId);
            alert(`Student: ${student.name}\nEmail: ${student.email}\nEnrolled Courses: ${enrollments.length}`);
        };

        // Initialize
        loadFromLocalStorage();
        render();
    </script>
</body>
</html>
